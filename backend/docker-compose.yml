version: "3.8"

name: ground-explorer

services:
  db:
    image: postgres:15-alpine
    container_name: ground-explorer-db
    environment:
      POSTGRES_DB: grounddata
      POSTGRES_USER: grounduser
      POSTGRES_PASSWORD: groundpass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grounduser -d grounddata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grounddata_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ground-explorer-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://grounduser:groundpass123@db:5432/grounddata
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY} # ✅ Add this
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY} # ✅ Add this
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - grounddata_network
    restart: unless-stopped

# Named volume for database persistence
volumes:
  postgres_data:
    driver: local

# Network for service communication
networks:
  grounddata_network:
    driver: bridge
